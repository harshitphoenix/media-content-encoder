name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ─── Lint & Format ──────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

  # ─── Test ───────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mce
          POSTGRES_PASSWORD: mce_dev_password
          POSTGRES_DB: mce_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mce -d mce_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://mce:mce_dev_password@localhost:5432/mce_test
      REDIS_URL: redis://localhost:6379
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_ACCESS_KEY_ID: test_key
      STORAGE_SECRET_ACCESS_KEY: test_secret_key_at_least_32_chars
      STORAGE_BUCKET_ORIGINALS: mce-originals
      STORAGE_BUCKET_VARIANTS: mce-variants
      STORAGE_REGION: us-east-1
      STORAGE_FORCE_PATH_STYLE: 'true'
      CDN_BASE_URL: http://localhost:9000/mce-variants
      CDN_URL_TTL_SECONDS: '3600'
      MAX_IMAGE_SIZE_BYTES: '104857600'
      MAX_VIDEO_SIZE_BYTES: '5368709120'
      MAX_IMAGE_WIDTH: '7680'
      MAX_IMAGE_HEIGHT: '4320'
      MAX_VIDEO_DURATION_SECONDS: '7200'
      JOB_MAX_ATTEMPTS: '3'
      JOB_BACKOFF_BASE_MS: '5000'
      JWT_SECRET: test_jwt_secret_that_is_at_least_32_characters
      JWT_EXPIRY: 7d
      LOG_LEVEL: error

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm db:migrate

      - name: Run tests
        run: pnpm test

  # ─── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build
