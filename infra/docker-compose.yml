services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mce
      POSTGRES_PASSWORD: mce_dev_password
      POSTGRES_DB: mce_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mce -d mce_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mce-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ─── MinIO (S3-compatible) ────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: mce-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mce_access_key
      MINIO_ROOT_PASSWORD: mce_secret_key_change_me_in_prod
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Admin console (http://localhost:9001)
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── MinIO bucket initializer ─────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: mce-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 mce_access_key mce_secret_key_change_me_in_prod;
        mc mb --ignore-existing local/mce-originals;
        mc mb --ignore-existing local/mce-variants;
        echo 'Buckets ready.';
        exit 0;
      "
    restart: on-failure

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  default:
    name: mce-network
